<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Support Login | Web to Case</title>

    <!-- Page Styling Only (NO FORM LOGIC TOUCHED) -->
    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: #ffffff;
            width: 420px;
            padding: 30px 35px;
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .login-container p {
            text-align: center;
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
            color: #34495e;
            font-weight: 600;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 16px;
            border-radius: 6px;
            border: 1px solid #ccd1d9;
            font-size: 14px;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #3498db;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        input[type="submit"],
        button {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-size: 15px;
            cursor: pointer;
        }

        input[type="submit"] {
            background-color: #3498db;
            color: #fff;
        }

        input[type="submit"]:hover {
            background-color: #2980b9;
        }

        button.reset-btn {
            background-color: #ecf0f1;
            color: #2c3e50;
        }

        button.reset-btn:hover {
            background-color: #d0d7de;
        }

        .footer-note {
            margin-top: 18px;
            text-align: center;
            font-size: 12px;
            color: #95a5a6;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Customer Support</h2>
        <p>Please log a case with your details</p>

        <!-- ✅ ORIGINAL CODE – NOT REMOVED OR EDITED -->

        <!--  ----------------------------------------------------------------------  -->
        <!--  NOTE: Please add the following <META> element to your page <HEAD>.      -->
        <!--  If necessary, please modify the charset parameter to specify the        -->
        <!--  character set of your HTML page.                                        -->
        <!--  ----------------------------------------------------------------------  -->

        <META HTTP-EQUIV="Content-type" CONTENT="text/html; charset=UTF-8">

        <!--  ----------------------------------------------------------------------  -->
        <!--  NOTE: Please add the following <FORM> element to your page.             -->
        <!--  ----------------------------------------------------------------------  -->

        <form action="https://webto.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00Dg5000007gMGD" method="POST">

            <input type=hidden name="orgid" value="00Dg5000007gMGD">
            <input type=hidden name="retURL" value="http://">

            <label for="name">Contact Name</label>
            <input id="name" maxlength="80" name="name" size="20" type="text" />

            <label for="email">Email</label>
            <input id="email" maxlength="80" name="email" size="20" type="text" />

            <label for="phone">Phone</label>
            <input id="phone" maxlength="40" name="phone" size="20" type="text" />

            <label for="subject">Subject</label>
            <input id="subject" maxlength="80" name="subject" size="20" type="text" />

            <label for="description">Description</label>
            <textarea name="description"></textarea>

            <div class="button-group">
                <input type="submit" name="submit" value="Submit Case">
                <button type="reset" class="reset-btn">Reset</button>
            </div>

        </form>

        <div class="footer-note">
            Salesforce Web‑to‑Case · Secure Submission
        </div>
    </div>

</body>
</html>
